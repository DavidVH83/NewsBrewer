# ============================================================
# NEWSBREWER CONFIGURATION
# Never commit this file to GitHub — it is in .gitignore
# ============================================================

email_sources:
  accounts:
    - name: "Gmail"
      imap_server: "imap.gmail.com"
      imap_port: 993
      email: ""          # Set via ACCOUNT_1_EMAIL in .env
      app_password: ""   # Set via ACCOUNT_1_PASSWORD in .env

    # Outlook uitgeschakeld — app-wachtwoorden niet beschikbaar op dit account
    # - name: "Outlook"
    #   imap_server: "outlook.office365.com"
    #   imap_port: 993
    #   email: ""
    #   app_password: ""

  # Scan ALL emails — AI analyst decides what is relevant
  # newsletter_senders is kept empty intentionally
  newsletter_senders: []

  manual_keyword: "BREW"

ai_focus:
  language: "nl"

  interesting_topics:
    - "AI agents and agentic systems"
    - "LLMs, RAG, fine-tuning, prompt engineering"
    - "New AI developer tools and frameworks (LangChain, LangGraph, CrewAI, AutoGen, etc.)"
    - "AI courses and learning resources"
    - "MCP, context engineering, AI infrastructure"
    - "Anthropic, Claude, OpenAI, GPT updates"
    - "Practical AI tutorials and how-to guides"

  not_interesting_topics:
    - "Marketing content without technical depth"
    - "No-code website builders"
    - "Company stock prices and earnings"
    - "General business news unrelated to AI"
    - "Social media tips and tricks"

  min_relevance_score: 6.0
  highlight_courses: true

delivery:
  smtp_server: "smtp.gmail.com"
  smtp_port: 587
  smtp_email: ""        # Set via SMTP_EMAIL in .env
  smtp_password: ""     # Set via SMTP_PASSWORD in .env
  send_to: ""           # Set via DIGEST_RECIPIENT in .env
  max_articles: 10
  schedule: "0 6 * * *"
  timezone: "Europe/Brussels"

model:
  provider: "github_models"
  name: "gpt-4o-mini"
  # Token auto-available as GITHUB_TOKEN in GitHub Actions
  # For local testing: set GITHUB_TOKEN in .env
